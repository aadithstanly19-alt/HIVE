<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards - Hive Learning</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <style>
    :root,
    :root[data-theme="dark"] {
      --primary: #f5a623;
      --primary-dark: #d4831a;
      --bg: #0a0a0b;
      --bg-card: #141415;
      --bg-card-hover: #1c1c1e;
      --text: #ffffff;
      --text-muted: #8a8a93;
      --border: #2a2a2e;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --success: #2ecc71;
    }

    :root[data-theme="light"] {
      --primary: #f5a623;
      --primary-dark: #d4831a;
      --bg: #faf8f4;
      --bg-card: #ffffff;
      --bg-card-hover: #fcfcfc;
      --text: #1a1208;
      --text-muted: #8a7a65;
      --border: #e8e2d9;
      --glass: rgba(0, 0, 0, 0.03);
      --glass-border: rgba(0, 0, 0, 0.08);
      --success: #27ae60;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      display: flex;
    }

    /* ── Typography ── */
    h1,
    h2,
    h3,
    .logo-text {
      font-family: 'Fraunces', serif;
    }

    /* ── Sidebar ── */
    aside {
      width: 280px;
      height: 100vh;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg) 100%);
    }

    .logo-area {
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-hex {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      box-shadow: 0 0 16px rgba(245, 166, 35, 0.4);
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--text), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-menu {
      padding: 2rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }

    .nav-item:hover {
      background: var(--glass);
      color: var(--text);
    }

    .nav-item.active {
      background: linear-gradient(90deg, rgba(245, 166, 35, 0.12), rgba(245, 166, 35, 0.04));
      color: var(--primary);
      border: 1px solid rgba(245, 166, 35, 0.2);
      box-shadow: inset 3px 0 0 var(--primary);
    }

    .nav-icon {
      font-size: 1.25rem;
    }

    .user-area {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #000;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 0 14px rgba(245, 166, 35, 0.35);
    }

    .user-details h4 {
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .user-details p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-logout {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-logout:hover {
      color: #e74c3c;
    }

    /* ── Main Content ── */
    main {
      flex: 1;
      margin-left: 280px;
      padding: 2.5rem 3.5rem;
      display: flex;
      flex-direction: column;
    }

    header {
      margin-bottom: 2.5rem;
    }

    .greeting h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .greeting p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* ── Deck Selection ── */
    .deck-selector {
      margin-bottom: 2rem;
    }

    select {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      width: 100%;
      max-width: 400px;
      outline: none;
      transition: border-color 0.2s;
      cursor: pointer;
      appearance: none;
    }
    
    select:focus {
      border-color: var(--primary);
    }

    .select-wrapper {
      position: relative;
      max-width: 400px;
    }

    .select-wrapper::after {
      content: '▼';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── Flashcard Core View ── */
    .flashcard-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* Check study.html modal CSS for reference */
    .flashcard-perspective {
      perspective: 1000px;
      width: 100%;
      height: 400px;
      margin-bottom: 2rem;
      cursor: pointer;
    }

    .flashcard-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .flashcard-perspective.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .flashcard-front, .flashcard-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    .flashcard-front {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg) 100%);
    }

    .flashcard-front h2 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .flashcard-back {
      transform: rotateY(180deg);
      background: var(--bg-card);
      flex-direction: column;
      text-align: left;
      align-items: flex-start;
    }

    .flashcard-back p {
      font-size: 1.25rem;
      line-height: 1.6;
      color: var(--text);
    }

    .card-footer-hint {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .flashcard-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 500px;
      background: var(--bg-card);
      padding: 1rem 2rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .fc-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s, transform 0.2s;
      font-family: inherit;
      padding: 0.5rem 1rem;
    }

    .fc-btn:hover:not(:disabled) {
      color: var(--primary);
      transform: scale(1.05);
    }
    
    .fc-btn:disabled {
      color: var(--border);
      cursor: not-allowed;
    }

    .fc-progress {
      font-variant-numeric: tabular-nums;
      font-family: monospace;
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Empty State ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* ── Loading Spinner ── */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--glass-border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="loadingScreen">
    <div class="spinner"></div>
  </div>

  <aside>
    <div class="logo-area">
      <div class="logo-hex"></div>
      <span class="logo-text">Hive.</span>
    </div>
    <div class="nav-menu">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">📊</span>

      </a>
      <a href="calendar.html" class="nav-item">

      <a href="behaviour.html" class="nav-item">

        Behaviour
      </a>
      <a href="certificates.html" class="nav-item">
        <span class="nav-icon">🏆</span>

      </a>
      <a href="quiz.html" class="nav-item">

        Quizzes
      </a>
      <a href="flashcards.html" class="nav-item active">
        <span class="nav-icon">📇</span>

      </a>
      <a href="analytics.html" class="nav-item">

      </a>
      <a href="ai-chat.html" class="nav-item">

      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙️</span>
        Settings
      </a>
    </div>
    <div class="user-area">
      <div class="user-info">
        <div class="avatar" id="avatarInitial">U</div>
        <div class="user-details">
          <h4 id="userName">User</h4>
          <p id="userEmail">user@example.com</p>
        </div>
      </div>
      <div style="display:flex; gap: 8px;">
        <button class="btn-logout" title="Toggle Theme" onclick="toggleTheme()">
          <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button class="btn-logout" title="Sign out" onclick="logout()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <main>
    <header>
      <div class="greeting">
        <h1>Flashcards</h1>
        <p>Master key concepts by reviewing active recall flashcards.</p>
      </div>
    </header>

    <div class="deck-selector">
      <div class="select-wrapper">
        <select id="deckSelect">
          <option value="all">All Flashcards</option>
          <!-- Options injected via JS -->
        </select>
      </div>
    </div>

    <div class="flashcard-area" id="flashcardArea">
      <!-- Injected via JS -->
    </div>
  </main>

  <script src="data.js"></script>
  <script>
    // ── Supabase & Auth ──
    const SUPABASE_URL = 'https://gabpzpkkrbxiyeopyhby.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYnB6cGtrcmJ4aXllb3B5aGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjA0NzUsImV4cCI6MjA4OTI5NjQ3NX0.sSosG5y6ErjiibcO74moTt103QYtnFZqZQ12tLpJB9g';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') {
        window.location.href = 'index.html';
      }
    });

    // ── Flashcard Logic ──
    let allDecks = [];
    let currentDeck = [];
    let currentCardIndex = 0;

    const deckSelect = document.getElementById('deckSelect');
    const flashcardArea = document.getElementById('flashcardArea');

    function populateDecks() {
      // Find all modules that have flashcards inside coursesData from data.js
      let htmlOptions = '<option value="all">All Flashcards</option>';
      
      for (const courseKey in coursesData) {
        const course = coursesData[courseKey];
        if (course.modules) {
          course.modules.forEach((mod) => {
            if (mod.flashcards && mod.flashcards.length > 0) {
              const deckItem = {
                id: `${courseKey}-${mod.id}`,
                courseTitle: course.title,
                moduleTitle: mod.title,
                cards: mod.flashcards
              };
              allDecks.push(deckItem);
              htmlOptions += `<option value="${deckItem.id}">${course.icon} ${course.title}: ${mod.title}</option>`;
            }
          });
        }
      }
      
      deckSelect.innerHTML = htmlOptions;
      
      // Load selected deck
      deckSelect.addEventListener('change', (e) => loadDeck(e.target.value));
      loadDeck('all');
    }

    function loadDeck(deckId) {
      if (deckId === 'all') {
        // Flatten all cards from all decks
        currentDeck = [];
        allDecks.forEach(deck => {
          deck.cards.forEach(card => {
            currentDeck.push({
              ...card,
              source: `${deck.courseTitle} - ${deck.moduleTitle}`
            });
          });
        });
      } else {
        const found = allDecks.find(d => d.id === deckId);
        if (found) {
          currentDeck = found.cards.map(card => ({
            ...card,
            source: found.moduleTitle
          }));
        } else {
          currentDeck = [];
        }
      }

      currentCardIndex = 0;
      renderCard();
    }

    function renderCard() {
      if (currentDeck.length === 0) {
        flashcardArea.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h2>No flashcards found</h2>
            <p>Select another course or check back later.</p>
          </div>
        `;
        return;
      }

      const card = currentDeck[currentCardIndex];
      const isFirst = currentCardIndex === 0;
      const isLast = currentCardIndex === currentDeck.length - 1;

      TTS.speak(card.q);

      flashcardArea.innerHTML = `
        <div class="flashcard-perspective" id="fcPerspective" onclick="flipCard(this)">
          <div class="flashcard-inner">
            <div class="flashcard-front">
              <div>
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom: 1rem;">${card.source || ''}</p>
                <h2>${card.q}</h2>
              </div>
              <div class="card-footer-hint">Click to flip</div>
            </div>
            <div class="flashcard-back">
              <p>${card.a}</p>
              <div class="card-footer-hint">Click to flip back</div>
            </div>
          </div>
        </div>

        <div class="flashcard-controls">
          <button class="fc-btn" onclick="prevCard()" ${isFirst ? 'disabled' : ''}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Prev
          </button>
          
          <div class="fc-progress" style="display:flex; align-items:center; gap: 8px;">
            ${currentCardIndex + 1} / ${currentDeck.length}
            ${TTS.isEnabled() ? `<button class="fc-btn" style="padding:4px; font-size:1.2rem;" title="Stop Audio" onclick="TTS.stop(event)">🔇</button>` : ''}
          </div>
          
          <button class="fc-btn" onclick="nextCard()" ${isLast ? 'disabled' : ''}>
            Next
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>
      `;
      
      // Allow spacebar or enter to flip
      document.onkeydown = (e) => {
        if(e.code === 'Space' || e.code === 'Enter') {
          e.preventDefault();
          const el = document.getElementById('fcPerspective');
          if (el) flipCard(el);
        } else if (e.code === 'ArrowRight' && !isLast) {
          nextCard();
        } else if (e.code === 'ArrowLeft' && !isFirst) {
          prevCard();
        }
      };
    }

    window.flipCard = function(element) {
      // Prevent child elements like buttons from triggering if needed, though card is whole
      if (typeof window.event !== 'undefined' && window.event && window.event.stopPropagation) {
        window.event.stopPropagation();
      }
      
      const isFlipped = element.classList.toggle('flipped');
      const card = currentDeck[currentCardIndex];
      if (isFlipped) {
        TTS.speak(card.a);
      } else {
        TTS.speak(card.q);
      }
    };

    // Attach to window so inline onclick handlers work
    window.nextCard = function() {
      if (currentCardIndex < currentDeck.length - 1) {
        currentCardIndex++;
        renderCard();
      }
    };

    window.prevCard = function() {
      if (currentCardIndex > 0) {
        currentCardIndex--;
        renderCard();
      }
    };


    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session?.user) {
        window.location.href = 'index.html';
        return;
      }
      const user = session.user;
      
      const email = user.email || '';
      const name = user.user_metadata?.full_name || user.user_metadata?.name || email.split('@')[0] || 'Student';
      const initial = name.charAt(0).toUpperCase();

      document.getElementById('userName').textContent = name;
      document.getElementById('userEmail').textContent = email;
      document.getElementById('avatarInitial').textContent = initial;

      document.getElementById('loadingScreen').style.display = 'none';
      
      populateDecks();
    }

    // ── Theme ──
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    }
    
    function updateThemeIcon(theme) {
      const icon = document.getElementById('themeIcon');
      if (theme === 'light') {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
      }
    }

    const savedThemeInit = localStorage.getItem('theme') || 'dark';
    updateThemeIcon(savedThemeInit);

    init();
  </script>
  <script src="notifications.js"></script>
  <script src="tts.js"></script>
  <script src="bee-timer.js"></script>
</body>

</html>
