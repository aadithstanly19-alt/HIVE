<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tutor - Hive Learning</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <style>
    :root,
    :root[data-theme="dark"] {
      --primary: #f5a623;
      --primary-dark: #d4831a;
      --bg: #0a0a0b;
      --bg-card: #141415;
      --bg-card-hover: #1c1c1e;
      --text: #ffffff;
      --text-muted: #8a8a93;
      --border: #2a2a2e;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --success: #2ecc71;
    }

    :root[data-theme="light"] {
      --primary: #f5a623;
      --primary-dark: #d4831a;
      --bg: #faf8f4;
      --bg-card: #ffffff;
      --bg-card-hover: #fcfcfc;
      --text: #1a1208;
      --text-muted: #8a7a65;
      --border: #e8e2d9;
      --glass: rgba(0, 0, 0, 0.03);
      --glass-border: rgba(0, 0, 0, 0.08);
      --success: #27ae60;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      display: flex;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    .logo-text {
      font-family: 'Fraunces', serif;
    }

    /* ── Sidebar ── */
    aside {
      width: 280px;
      height: 100vh;
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg) 100%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
    }

    .logo-area {
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-hex {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      box-shadow: 0 0 16px rgba(245, 166, 35, 0.4);
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--text), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-menu {
      padding: 2rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: var(--glass);
      color: var(--text);
    }

    .nav-item.active {
      background: linear-gradient(90deg, rgba(245, 166, 35, 0.12), rgba(245, 166, 35, 0.04));
      color: var(--primary);
      border: 1px solid rgba(245, 166, 35, 0.2);
      box-shadow: inset 3px 0 0 var(--primary);
    }

    .nav-icon {
      font-size: 1.25rem;
    }

    .user-area {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #000;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 0 14px rgba(245, 166, 35, 0.35);
    }

    .user-details h4 {
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .user-details p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-logout {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-logout:hover {
      color: #e74c3c;
    }

    /* ── Main ── */
    main {
      flex: 1;
      margin-left: 280px;
      padding: 2.5rem 3.5rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      margin-bottom: 2rem;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .main-grid {
      flex: 1;
      display: flex;
      gap: 2rem;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .chat-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ── Bee Timer ── */
    .bee-timer {
      width: 320px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-top: 5px solid var(--primary);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .bee-timer::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
      z-index: 0;
    }

    .timer-header {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1;
    }

    .timer-display {
      font-size: 4rem;
      font-weight: 700;
      font-family: monospace;
      color: var(--primary);
      margin: 1.5rem 0;
      text-shadow: 0 0 20px rgba(245,166,35,0.3);
      z-index: 1;
    }

    .timer-controls {
      display: flex;
      gap: 1rem;
      width: 100%;
      z-index: 1;
    }

    .btn-timer {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-timer.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #000;
      box-shadow: 0 4px 15px rgba(245,166,35,0.3);
    }
    .btn-timer.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245,166,35,0.4);
    }

    .btn-timer.secondary {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-timer.secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    .timer-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      background: var(--bg);
      padding: 0.3rem;
      border-radius: 8px;
      width: 100%;
      z-index: 1;
    }
    
    .timer-tab {
      flex: 1;
      padding: 0.5rem;
      background: none;
      border: none;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    
    .timer-tab.active {
      background: var(--bg-card);
      color: var(--text);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    zapier-interfaces-chatbot-embed {
      width: 100%;
      height: 100%;
    }

    /* Loading / Spinner */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--glass-border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loadingScreen">
    <div class="spinner"></div>
  </div>

  <aside>
    <div class="logo-area">
      <div class="logo-hex"></div>
      <span class="logo-text">Hive.</span>
    </div>
    <div class="nav-menu">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="behaviour.html" class="nav-item">
        <span class="nav-icon">🧠</span> Behaviour
      </a>
      <a href="certificates.html" class="nav-item">
        <span class="nav-icon">🏆</span> Certificates
      </a>
      <a href="quiz.html" class="nav-item">
        <span class="nav-icon">📝</span> Quizzes
      </a>
      <a href="flashcards.html" class="nav-item">
        <span class="nav-icon">📇</span> Flashcards
      </a>
      <a href="analytics.html" class="nav-item">
        <span class="nav-icon">📈</span> Analytics
      </a>
      <a href="ai-chat.html" class="nav-item active">
        <span class="nav-icon">🐝</span> AI Tutor
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </div>
    <div class="user-area">
      <div class="user-info">
        <div class="avatar" id="avatarInitial">U</div>
        <div class="user-details">
          <h4 id="userName">User</h4>
          <p id="userEmail">user@example.com</p>
        </div>
      </div>
      <div style="display:flex; gap: 8px;">
        <button class="btn-logout" title="Toggle Theme" onclick="toggleTheme()">
          <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button class="btn-logout" title="Sign out" onclick="logout()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <main>
    <header>
      <h1>🐝 AI Tutor</h1>
      <p>Ask questions, get explanations, and master your courses with your personal AI assistant.</p>
    </header>

    <div class="chat-container">
      <script async type='module'
        src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
      <zapier-interfaces-chatbot-embed is-popup='false' chatbot-id='cmmv4ek6m00idxrh2r5euktmf' height='100%'
        width='100%'></zapier-interfaces-chatbot-embed>
    </div>
  </main>

  <script src="data.js"></script>
  <script>
    const SUPABASE_URL = 'https://gabpzpkkrbxiyeopyhby.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYnB6cGtrcmJ4aXllb3B5aGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjA0NzUsImV4cCI6MjA4OTI5NjQ3NX0.sSosG5y6ErjiibcO74moTt103QYtnFZqZQ12tLpJB9g';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }
    sb.auth.onAuthStateChange((event) => { if (event === 'SIGNED_OUT') window.location.href = 'index.html'; });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session?.user) { window.location.href = 'index.html'; return; }
      const user = session.user;
      const name = user.user_metadata?.full_name || user.user_metadata?.name || user.email.split('@')[0] || 'Student';
      document.getElementById('userName').textContent = name;
      document.getElementById('userEmail').textContent = user.email || '';
      document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

      document.getElementById('loadingScreen').style.display = 'none';
    }

    // ── Theme ──
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    }
    function updateThemeIcon(theme) {
      const icon = document.getElementById('themeIcon');
      if (theme === 'light') {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
      }
    }
    updateThemeIcon(localStorage.getItem('theme') || 'dark');

    init();
  </script>
  <script src="bee-timer.js"></script>
</body>

</html>
