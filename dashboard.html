<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Hive Learning</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <style>
    :root,
    :root[data-theme="dark"] {
      --primary: #f5a623;
      --primary-dark: #d4831a;
      --bg: #0a0a0b;
      --bg-card: #141415;
      --bg-card-hover: #1c1c1e;
      --text: #ffffff;
      --text-muted: #8a8a93;
      --border: #2a2a2e;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --success: #2ecc71;
    }

    :root[data-theme="light"] {
      --primary: #f5a623;
      --primary-dark: #d4831a;
      --bg: #faf8f4;
      --bg-card: #ffffff;
      --bg-card-hover: #fcfcfc;
      --text: #1a1208;
      --text-muted: #8a7a65;
      --border: #e8e2d9;
      --glass: rgba(0, 0, 0, 0.03);
      --glass-border: rgba(0, 0, 0, 0.08);
      --success: #27ae60;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      display: flex;
    }

    /* ── Typography ── */
    h1,
    h2,
    h3,
    .logo-text {
      font-family: 'Fraunces', serif;
    }

    /* ── Sidebar ── */
    aside {
      width: 280px;
      height: 100vh;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg) 100%);
    }

    .logo-area {
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-hex {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      box-shadow: 0 0 16px rgba(245, 166, 35, 0.4);
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--text), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-menu {
      padding: 2rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }

    .nav-item:hover {
      background: var(--glass);
      color: var(--text);
    }

    .nav-item.active {
      background: linear-gradient(90deg, rgba(245, 166, 35, 0.12), rgba(245, 166, 35, 0.04));
      color: var(--primary);
      border: 1px solid rgba(245, 166, 35, 0.2);
      box-shadow: inset 3px 0 0 var(--primary);
    }

    .nav-icon {
      font-size: 1.25rem;
    }

    .user-area {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #000;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 0 14px rgba(245, 166, 35, 0.35);
    }

    .user-details h4 {
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .user-details p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-logout {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-logout:hover {
      color: #e74c3c;
    }

    /* ── Main Content ── */
    main {
      flex: 1;
      margin-left: 280px;
      padding: 3rem 4rem;
      max-width: 1400px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .greeting h1 {
      font-size: 2.6rem;
      margin-bottom: 0.4rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .greeting h1 span {
      color: var(--primary);
      font-style: italic;
    }

    .greeting p {
      color: var(--text-muted);
      font-size: 1.05rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.6rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(245,166,35,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(245,166,35,0.15);
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(245,166,35,0.15), rgba(245,166,35,0.05));
      border: 1px solid rgba(245, 166, 35, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .stat-info p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-info h3 {
      font-size: 1.85rem;
      font-family: 'Outfit';
      font-weight: 700;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-header h2 {
      font-size: 1.8rem;
      font-weight: 600;
    }

    .btn-view-all {
      background: none;
      border: none;
      color: var(--primary);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-view-all:hover {
      text-decoration: underline;
    }

    /* ── Curriculum Progress Bar ── */
    .progress-section {
      margin-bottom: 2.5rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
    }

    .progress-meta span:last-child {
      color: var(--primary);
      font-weight: 600;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-dark), var(--primary));
      border-radius: 4px;
      transition: width 0.8s ease;
      box-shadow: 0 0 12px rgba(245, 166, 35, 0.6);
    }

    /* ── Honeycomb Grid ── */
    .honeycomb-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4rem 2rem;
      min-height: 50vh;
      overflow: visible;
    }

    .honeycomb {
      position: relative;
      /* Acts as true center coordinate */
      width: 0;
      height: 0;
    }

    .hex-wrapper {
      position: absolute;
      /* 
        For a flat-topped hexagon, standard ratio is ~ 1 : 1.15 W:H 
        Or pointy-topped is 1.15 : 1 W:H
        We'll use pointy-topped: width=130, height=150
      */
      width: 130px;
      height: 150px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
      opacity: 0;
      animation: popIn 0.5s forwards;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .hex {
      width: 100%;
      height: 100%;
      background: var(--bg-card);
      /* Pointy-topped hexagon clip path */
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text);
    }

    .hex::before {
      content: '';
      position: absolute;
      inset: 2px;
      background: var(--bg-card);
      /* Must match the parent clip-path */
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      z-index: -1;
      transition: background 0.3s;
    }

    .hex-content {
      text-align: center;
      padding: 1rem;
      z-index: 10;
    }

    .hex-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      transition: transform 0.3s;
    }

    .hex-title {
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Outfit';
      line-height: 1.2;
    }

    /* States */
    .hex.completed {
      background: var(--primary);
      /* Outer border glow */
    }

    .hex.completed::before {
      background: var(--bg-card);
    }

    .hex.completed:hover {
      transform: scale(1.05);
    }

    .hex.unlocked {
      background: var(--primary);
      animation: pulseHex 2s infinite;
    }

    .hex.unlocked::before {
      background: rgba(245, 166, 35, 0.1);
      /* Slight inner glow */
    }

    .hex.unlocked:hover {
      transform: scale(1.05);
    }

    .hex.locked {
      background: var(--border);
      cursor: not-allowed;
      opacity: 0.6;
    }

    .hex.locked::before {
      background: var(--bg);
    }

    .hex.locked .hex-icon {
      filter: grayscale(1);
    }

    @keyframes pulseHex {
      0% {
        box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.4);
      }

      70% {
        box-shadow: 0 0 0 15px rgba(245, 166, 35, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(245, 166, 35, 0);
      }
    }

    /* Loading / Auth Check Spinner */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--glass-border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

    <div class="spinner"></div>
  </div>

  <aside>
    <div class="logo-area">
      <div class="logo-hex"></div>
      <span class="logo-text">Hive.</span>
    </div>
    <div class="nav-menu">
      <a href="#" class="nav-item active">
        <span class="nav-icon">📊</span>

      </a>
      <a href="#" class="nav-item">

      <a href="#" class="nav-item">
        <span class="nav-icon">🏆</span>
        Certificates
      </a>
      <a href="#" class="nav-item">

    </div>
    <div class="user-area">
      <div class="user-info">
        <div class="avatar" id="avatarInitial">U</div>

          <h4 id="userName">User</h4>
          <p id="userEmail">user@example.com</p>
        </div>
      </div>
      <div style="display:flex; gap: 8px;">
        <button class="btn-logout" title="Toggle Theme" onclick="toggleTheme()">
          <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>

          </svg>
        </button>
      </div>

  </aside>

  <main>
    <header>
      <div class="greeting">
        <h1>Welcome back, <span id="welcomeName">there</span> 👋</h1>
        <p>Pick up right where you left off. Continue mastering your skills.</p>
      </div>
      <div>
        <button onclick="resetProgress()" style="background: var(--bg-card); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 0.6rem 1.2rem; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;">
          ↺ Reset Progress
        </button>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-section">
      <div class="progress-meta">
        <span id="progressLabel">Modules completed</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
          <p>Current Streak</p>
          <h3>12 Days</h3>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>

          <p>Total XP</p>
          <h3>4,250</h3>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎓</div>
        <div class="stat-info">
          <p>Courses Completed</p>

        </div>
      </div>
    </div>

    <div class="section-header">
      <h2>In Progress</h2>
      <button class="btn-view-all">View Curriculum →</button>
    </div>

    <div class="honeycomb-container">
      <div class="honeycomb" id="hexagonGrid">
        <!-- Rendered by JS -->
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://gabpzpkkrbxiyeopyhby.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYnB6cGtrcmJ4aXllb3B5aGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjA0NzUsImV4cCI6MjA4OTI5NjQ3NX0.sSosG5y6ErjiibcO74moTt103QYtnFZqZQ12tLpJB9g';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();

      if (!session?.user) {
        window.location.href = 'index.html';
        return;
      }

      const user = session.user;
      const email = user.email || '';

      let name = user.user_metadata?.full_name
        || user.user_metadata?.name
        || email.split('@')[0]?.replace(/[._]/g, ' ')
        || 'there';

      document.getElementById('welcomeName').textContent = name;
      document.getElementById('userName').textContent = name;
      document.getElementById('userEmail').textContent = email;
      document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

      document.getElementById('loadingScreen').style.display = 'none';
    }

    init();

    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') {
        window.location.href = 'index.html';
      }
    });

    // ── Honeycomb Logic ──
    const modules = [
      { id: 1, title: 'Network Basics', icon: '🌐', desc: 'An introduction to how the internet actually works. Covering the basics of IP addresses, routers, packets, and how computers communicate across the globe.', video: 'https://www.youtube.com/embed/_IOZ8_cPgu8' },
      { id: 2, title: 'System Design', icon: '⚡', desc: 'Core principles of designing scalable, highly-available distributed systems. Topics include load balancing, horizontal vs vertical scaling, and CAP theorem.', video: '' },
      { id: 3, title: 'Databases', icon: '💾', desc: 'Deep dive into relational (SQL) vs non-relational (NoSQL) databases, ACID properties, sharding, replication strategies, and choosing the right DB for the job.', video: '' },
      { id: 4, title: 'Caching', icon: '🚀', desc: 'Strategies for minimizing latency using in-memory data stores like Redis and Memcached, CDN architectures, and cache invalidation policies.', video: '' },
      { id: 5, title: 'Message Queues', icon: '📫', desc: 'Decoupling services using asynchronous communication patterns with tools like Kafka and RabbitMQ to ensure reliable data delivery and event-driven architecture.', video: '' },
      { id: 6, title: 'Microservices', icon: '🧩', desc: 'Breaking down monoliths into independent deployable microservices, handling inter-service communication (gRPC/REST), and API Gateways.', video: '' },
      { id: 7, title: 'Security', icon: '🔒', desc: 'Implementing robust security postures, TLS/SSL termination, OAuth/JWT authentication flows, rate limiting, and protecting against common vulnerabilities (DDoS, XSS, CSRF).', video: '' },
      { id: 8, title: 'Prompt Eng.', icon: '🤖', desc: 'Techniques for effectively conversing with LLMs: zero-shot vs few-shot prompting, chain-of-thought, system prompts, and mitigating hallucinations.', video: '' },
      { id: 9, title: 'Agents', icon: '🧠', desc: 'Building autonomous AI systems that iterate, plan, use external tools, and manage long-term memory to solve complex multi-step problems.', video: '' }
    ];

    // Math for pointy-topped hexagons:
    // Width = w (130)
    // Horizontal distance between centers = w (130)
    // Vertical distance between centers = height * 0.75 (150 * 0.75 = 112.5)
    // Offset for odd rows = w / 2 (65)

    const w = 136; // horizontal spacing slightly wider for gap
    const h = 118; // vertical spacing slightly wider for gap
    
    // First ring around center: 
    // Top-Right, Right, Bottom-Right, Bottom-Left, Left, Top-Left
    // Second ring follows
    const positions = [
      { x: 0, y: 0 },             // 1: Center
      { x: w / 2, y: -h },        // 2: Top Right
      { x: w, y: 0 },             // 3: Right
      { x: w / 2, y: h },         // 4: Bottom Right
      { x: -w / 2, y: h },        // 5: Bottom Left
      { x: -w, y: 0 },            // 6: Left
      { x: -w / 2, y: -h },       // 7: Top Left
      { x: 0, y: -h * 2 },        // 8: Top (Outer)
      { x: w, y: -h * 2 }         // 9: Outer Top Right
    ];

    // Read progression from local storage (default to module 1 unlocked)
    let highestUnlocked = parseInt(localStorage.getItem('highestUnlocked')) || 1;

    function updateProgressBar() {
      const completed = highestUnlocked - 1;
      const total = modules.length;
      const pct = Math.round((completed / total) * 100);
      document.getElementById('progressFill').style.width = `${pct}%`;
      document.getElementById('progressPercent').textContent = `${pct}%`;
      document.getElementById('progressLabel').textContent = `${completed} of ${total} modules completed`;
    }

    function renderHoneycomb() {
      const grid = document.getElementById('hexagonGrid');
      grid.innerHTML = '';

      modules.forEach((mod, index) => {
        let stateClass = 'locked';
        let iconDisplay = '🔒';

        if (mod.id < highestUnlocked) {
          stateClass = 'completed';
          iconDisplay = '✅';
        } else if (mod.id === highestUnlocked) {
          stateClass = 'unlocked';
          iconDisplay = mod.icon;
        }

        const pos = positions[index] || { x: 0, y: 0 };
        const wrapper = document.createElement('div');
        wrapper.className = 'hex-wrapper';
        wrapper.style.left = `${pos.x}px`;
        wrapper.style.top = `${pos.y}px`;
        // add staggered animation delay based on index so they pop in nicely
        wrapper.style.animationDelay = `${index * 0.1}s`;
        
        wrapper.innerHTML = `
          <div class="hex ${stateClass}" onclick="handleHexClick(${mod.id})">
            <div class="hex-content">
              <div class="hex-icon">${iconDisplay}</div>
              <div class="hex-title">${mod.title}</div>
            </div>
          </div>
        `;
        grid.appendChild(wrapper);
      });
    }

    function handleHexClick(id) {
      if (id > highestUnlocked) {
        return;
      }
      window.location.href = `study.html?module=${id}`;
    }

    // Render immediately
    renderHoneycomb();
    updateProgressBar();

    function resetProgress() {
      if (confirm('Are you sure you want to reset all your module progression?')) {
        localStorage.setItem('highestUnlocked', 1);
        highestUnlocked = 1;
        renderHoneycomb();
        updateProgressBar();
      }
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('themeIcon');
      if (theme === 'light') {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      updateThemeIcon(savedTheme);
    });
  </script>
</body>

</html>
