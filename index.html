<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hive Learning</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Instrument+Sans:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <style>
    :root,
    :root[data-theme="dark"] {
      --primary: #f5a623;
      --primary-hover: #d4831a;
      --bg: #0a0a0b;
      --bg-card: #141415;
      --text: #ffffff;
      --text-muted: #8a8a93;
      --border: #2a2a2e;
      --input-bg: rgba(0, 0, 0, 0.2);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    :root[data-theme="light"] {
      --primary: #f5a623;
      --primary-hover: #d4831a;
      --bg: #faf8f4;
      --bg-card: #ffffff;
      --text: #1a1208;
      --text-muted: #8a7a65;
      --border: #e8e2d9;
      --input-bg: #ffffff;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    body,
    .card,
    input {
      transition: background-color 0.3s, color 0.3s, border-color 0.3s;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      position: relative;
    }

    /* theme toggle inside card */
    .theme-toggle {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }

    .theme-toggle:hover {
      color: var(--text);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .logo-hex {
      width: 32px;
      height: 32px;
      background: var(--primary);
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
    }

    .logo-text {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: .4rem;
    }

    .sub {
      font-size: .875rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .75rem;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      margin-bottom: 1.25rem;
    }

    .btn-google:hover:not(:disabled) {
      border-color: var(--primary);
      background: var(--bg);
    }

    .btn-google:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.25rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: .75rem;
      color: var(--text-muted);
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: .4rem;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .7rem .9rem;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .9rem;
      color: var(--text);
      outline: none;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }

    input:focus {
      border-color: var(--primary);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .btn-main {
      width: 100%;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: .75rem;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }

    .btn-main:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-main:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      font-size: .8rem;
      border-radius: 8px;
      padding: .6rem .9rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .success-msg {
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: #2ecc71;
      font-size: .8rem;
      border-radius: 8px;
      padding: .6rem .9rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-msg.visible {
      display: block;
    }

    .tab-row {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.25rem;
    }

    .tab {
      flex: 1;
      background: none;
      border: 1.5px solid transparent;
      border-radius: 7px;
      padding: .5rem;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
    }

    .tab.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--input-bg);
    }

    .footer-note {
      text-align: center;
      margin-top: 1.25rem;
      font-size: .8rem;
      color: var(--text-muted);
    }

    .footer-note a {
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    /* Loading spinner */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    :root[data-theme="light"] .spinner {
      border-color: rgba(0, 0, 0, 0.1);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Loading screen while checking session -->
  <div id="loadingScreen">
    <div class="spinner"></div>
  </div>

  <!-- LOGIN CARD -->
  <div class="card" id="loginCard" style="display:none">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
      <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
    <div class="logo">
      <div class="logo-hex"></div>
      <span class="logo-text">Hive Learning</span>
    </div>

    <h1 id="formTitle">Welcome back</h1>
    <p class="sub" id="formSub">Sign in to continue learning.</p>

    <!-- Sign in / Sign up tabs -->
    <div class="tab-row">
      <button class="tab active" id="tabSignin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign up</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <button class="btn-google" id="googleBtn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285F4" />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34A853" />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          fill="#FBBC05" />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#EA4335" />
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button class="btn-main" id="submitBtn" onclick="emailAuth()">Sign in</button>

    <p class="footer-note" id="footerNote">
      No account? <a onclick="switchTab('signup')">Sign up free</a>
    </p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none">
    <div class="dash-top">
      <div class="dash-greeting">Hey, <span id="uname">there</span> 👋</div>
      <button class="btn-out" onclick="logout()">Sign out</button>
    </div>
    <div class="course">
      <div class="course-icon">💻</div>
      <div class="course-info">
        <div class="course-name">System Design</div>
        <div class="course-meta">24 lessons · 62% done</div>
        <div class="bar">
          <div class="bar-fill" style="width:62%"></div>
        </div>
      </div>
    </div>
    <div class="course">
      <div class="course-icon">🤖</div>
      <div class="course-info">
        <div class="course-name">Prompt Engineering</div>
        <div class="course-meta">16 lessons · 35% done</div>
        <div class="bar">
          <div class="bar-fill" style="width:35%"></div>
        </div>
      </div>
    </div>
    <div class="course">
      <div class="course-icon">📊</div>
      <div class="course-info">
        <div class="course-name">SQL for Analytics</div>
        <div class="course-meta">20 lessons · 80% done</div>
        <div class="bar">
          <div class="bar-fill" style="width:80%"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gabpzpkkrbxiyeopyhby.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYnB6cGtrcmJ4aXllb3B5aGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjA0NzUsImV4cCI6MjA4OTI5NjQ3NX0.sSosG5y6ErjiibcO74moTt103QYtnFZqZQ12tLpJB9g';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    let mode = 'signin'; // 'signin' | 'signup'

    // ── Helpers ──────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('successMsg').classList.remove('visible');
    }
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('errorMsg').classList.remove('visible');
    }
    function clearMessages() {
      document.getElementById('errorMsg').classList.remove('visible');
      document.getElementById('successMsg').classList.remove('visible');
    }
    function setLoading(on) {
      document.getElementById('submitBtn').disabled = on;
      document.getElementById('googleBtn').disabled = on;
      document.getElementById('submitBtn').textContent = on
        ? (mode === 'signin' ? 'Signing in…' : 'Creating account…')
        : (mode === 'signin' ? 'Sign in' : 'Create account');
    }

    // ── Tab switch ────────────────────────────────────────
    function switchTab(t) {
      mode = t;
      clearMessages();
      document.getElementById('tabSignin').classList.toggle('active', t === 'signin');
      document.getElementById('tabSignup').classList.toggle('active', t === 'signup');
      document.getElementById('formTitle').textContent = t === 'signin' ? 'Welcome back' : 'Create account';
      document.getElementById('formSub').textContent = t === 'signin' ? 'Sign in to continue learning.' : 'Join Hive Learning for free.';
      document.getElementById('submitBtn').textContent = t === 'signin' ? 'Sign in' : 'Create account';
      document.getElementById('footerNote').innerHTML = t === 'signin'
        ? 'No account? <a onclick="switchTab(\'signup\')">Sign up free</a>'
        : 'Already have an account? <a onclick="switchTab(\'signin\')">Sign in</a>';
    }

    // ── Show dashboard ────────────────────────────────────
    function showDashboard(user) {
      window.location.href = 'dashboard.html';
    }

    // ── Google OAuth ──────────────────────────────────────
    async function googleLogin() {
      clearMessages();
      document.getElementById('googleBtn').disabled = true;
      document.getElementById('googleBtn').innerHTML = 'Redirecting…';
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
      if (error) {
        showError(error.message);
        document.getElementById('googleBtn').disabled = false;
        document.getElementById('googleBtn').innerHTML = googleSVG + ' Continue with Google';
      }
    }

    // ── Email auth ────────────────────────────────────────
    async function emailAuth() {
      clearMessages();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }
      setLoading(true);
      if (mode === 'signin') {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { showError(error.message); setLoading(false); return; }
        showDashboard(data.user);
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) { showError(error.message); setLoading(false); return; }
        showSuccess('Account created! Check your email to confirm, then sign in.');
        switchTab('signin');
      }
      setLoading(false);
    }

    // ── Sign out ──────────────────────────────────────────
    async function logout() {
      await sb.auth.signOut();
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      clearMessages();
      switchTab('signin');
    }

    // ── Init: check existing session ─────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      document.getElementById('loadingScreen').style.display = 'none';
      if (session?.user) {
        showDashboard(session.user);
      } else {
        document.getElementById('loginCard').style.display = 'block';
      }
    }

    // Listen for auth state changes (handles OAuth redirect)
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session?.user) {
        document.getElementById('loadingScreen').style.display = 'none';
        window.location.href = 'dashboard.html';
      }
    });

    // Enter key submits
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('loginCard').style.display !== 'none') {
        emailAuth();
      }
    });

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('themeIcon');
      if (theme === 'light') {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      updateThemeIcon(savedTheme);
    });

    const googleSVG = `<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`;

    init();
  </script>
  <script src="bee-timer.js"></script>
</body>

</html>
